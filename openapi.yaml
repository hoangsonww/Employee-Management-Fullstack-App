openapi: 3.0.0
info:
  title: Employee Management System API
  version: 1.0.0
  description: API documentation for managing employees and departments - built with Java Spring Boot and MongoDB
  contact:
    name: Son Nguyen
    email: hoangson091104@gmail.com
  license:
    name: MIT License
servers:
  - url: https://employee-management-app-gdm5.onrender.com/
paths:
  /api/departments/{id}:
    get:
      summary: Get department by ID
      tags:
        - Departments
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Department retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Department'
        '404':
          description: Department not found
    put:
      summary: Update an existing department
      tags:
        - Departments
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Department'
      responses:
        '200':
          description: Department updated successfully
        '400':
          description: Invalid request
        '404':
          description: Department not found
    delete:
      summary: Delete a department
      tags:
        - Departments
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Department deleted successfully
        '404':
          description: Department not found
  /api/departments:
    get:
      summary: Get all departments
      tags:
        - Departments
      responses:
        '200':
          description: List of departments retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Department'
    post:
      summary: Create a new department
      tags:
        - Departments
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Department'
      responses:
        '201':
          description: Department created successfully
        '400':
          description: Invalid request
  /api/employees/{id}:
    get:
      summary: Get employee by ID
      tags:
        - Employees
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Employee retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Employee'
        '404':
          description: Employee not found
    put:
      summary: Update an existing employee
      tags:
        - Employees
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Employee'
      responses:
        '200':
          description: Employee updated successfully
        '400':
          description: Invalid request
        '404':
          description: Employee not found
    delete:
      summary: Delete an employee
      tags:
        - Employees
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Employee deleted successfully
        '404':
          description: Employee not found
  /api/employees:
    get:
      summary: Get all employees
      tags:
        - Employees
      responses:
        '200':
          description: List of employees retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Employee'
    post:
      summary: Create a new employee
      tags:
        - Employees
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Employee'
      responses:
        '201':
          description: Employee created successfully
        '400':
          description: Invalid request
  /reset-password:
    post:
      summary: Reset password
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                newPassword:
                  type: string
      responses:
        '200':
          description: Password reset successfully
        '400':
          description: Invalid request
  /register:
    post:
      summary: Register user
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/User'
      responses:
        '201':
          description: User registered successfully
        '400':
          description: Invalid request
  /authenticate:
    post:
      summary: Authenticate user
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Authentication successful
        '401':
          description: Invalid credentials
  /verify-username/{username}:
    get:
      summary: Verify username
      tags:
        - Authentication
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Username verified successfully
        '404':
          description: Username not found
  /api/passkeys/register/start:
    post:
      summary: Start passkey registration
      description: Begins a WebAuthn registration ceremony for the authenticated user and returns the flow id plus browser-ready creation options.
      tags:
        - Passkeys
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Registration options issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasskeyCeremonyStart'
        '401':
          description: Authentication required
  /api/passkeys/register/finish:
    post:
      summary: Finish passkey registration
      description: Verifies the authenticator attestation against the issued challenge and stores the new passkey.
      tags:
        - Passkeys
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasskeyRegistrationFinish'
      responses:
        '201':
          description: Passkey registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Passkey'
        '400':
          description: Ceremony expired or attestation malformed/unverifiable
        '401':
          description: Authentication required
        '409':
          description: This passkey is already registered
  /api/passkeys:
    get:
      summary: List my passkeys
      description: Returns all passkeys registered by the authenticated user, newest first.
      tags:
        - Passkeys
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Passkeys returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Passkey'
        '401':
          description: Authentication required
  /api/passkeys/{id}:
    patch:
      summary: Rename a passkey
      tags:
        - Passkeys
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  maxLength: 100
      responses:
        '200':
          description: Passkey renamed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Passkey'
        '401':
          description: Authentication required
        '404':
          description: Passkey not found
    delete:
      summary: Delete a passkey
      tags:
        - Passkeys
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Passkey deleted
        '401':
          description: Authentication required
        '404':
          description: Passkey not found
  /api/passkeys/authenticate/start:
    post:
      summary: Start passkey login
      description: Begins a WebAuthn assertion ceremony. Public endpoint — provide a username to scope the ceremony, or omit the body for a username-less (discoverable credential) login.
      tags:
        - Passkeys
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
      responses:
        '200':
          description: Assertion options issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasskeyCeremonyStart'
  /api/passkeys/authenticate/finish:
    post:
      summary: Finish passkey login
      description: Verifies the authenticator assertion and, on success, returns a JWT and the authenticated username. Public endpoint.
      tags:
        - Passkeys
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasskeyAuthenticationFinish'
      responses:
        '200':
          description: Authenticated; JWT issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  username:
                    type: string
        '400':
          description: Ceremony expired or assertion malformed
        '401':
          description: Passkey authentication failed
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Department:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
    Employee:
      type: object
      properties:
        id:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        departmentId:
          type: string
    User:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        email:
          type: string
        password:
          type: string
    Passkey:
      type: object
      description: A safe, client-facing summary of a registered passkey (never exposes key material).
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        transports:
          type: string
          nullable: true
          description: Comma-separated authenticator transports (e.g. "internal,hybrid").
        aaguid:
          type: string
          nullable: true
          description: Base64url-encoded authenticator model identifier, when known.
        discoverable:
          type: boolean
          nullable: true
          description: Whether the passkey can be used for username-less login.
        backupEligible:
          type: boolean
          nullable: true
        backupState:
          type: boolean
          nullable: true
          description: Whether the passkey is currently backed up / synced.
        createdAt:
          type: string
          format: date-time
        lastUsedAt:
          type: string
          format: date-time
          nullable: true
    PasskeyCeremonyStart:
      type: object
      description: The flow id and browser-ready public-key options returned when a ceremony starts.
      properties:
        flowId:
          type: string
          description: Opaque, single-use id that must be echoed back on the matching finish call.
        options:
          type: object
          description: 'Options for navigator.credentials, wrapped as { "publicKey": { ... } }.'
    PasskeyRegistrationFinish:
      type: object
      required:
        - flowId
        - credential
      properties:
        flowId:
          type: string
        credential:
          type: object
          description: The PublicKeyCredential JSON produced by navigator.credentials.create().
        name:
          type: string
          maxLength: 100
          description: Optional friendly label for the new passkey.
    PasskeyAuthenticationFinish:
      type: object
      required:
        - flowId
        - credential
      properties:
        flowId:
          type: string
        credential:
          type: object
          description: The PublicKeyCredential JSON produced by navigator.credentials.get().
