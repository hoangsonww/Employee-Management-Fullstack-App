# Import Environment Variables from config.properties file
spring.config.import=optional:file:config.properties

# Spring Boot Application Configuration
spring.application.name=Employee-Management

# MySQL Database Configuration (with env variables)
spring.datasource.url=jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT}/${MYSQL_DB}?ssl-mode=${MYSQL_SSL_MODE}
spring.datasource.username=${MYSQL_USER}
spring.datasource.password=${MYSQL_PASSWORD}

# Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# MongoDB Configuration (optional — not currently used by any repository)
spring.data.mongodb.uri=${MONGO_URI:}
spring.data.mongodb.auto-index-creation=false

# Server Configuration
server.port=8080

# JWT Configuration
jwt.secret=${JWT_SECRET}

# WebAuthn / Passkey Configuration
# rp-id MUST equal the effective domain the FRONTEND is served from (no scheme, no port).
#   - Local development: localhost
#   - Production example: employee-management-fullstack-app.vercel.app
# allowed-origins is a comma-separated list of the exact frontend origins (scheme + host + port)
# that are permitted to perform WebAuthn ceremonies.
webauthn.rp-id=${WEBAUTHN_RP_ID:localhost}
webauthn.rp-name=${WEBAUTHN_RP_NAME:Employee Management System}
webauthn.allowed-origins=${WEBAUTHN_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080}
# How long (in seconds) a registration/authentication ceremony stays valid between start and finish.
webauthn.ceremony-timeout-seconds=${WEBAUTHN_CEREMONY_TIMEOUT_SECONDS:300}
# Strict origin matching by default. Enable only if you cannot list every frontend port in allowed-origins.
webauthn.allow-origin-port=${WEBAUTHN_ALLOW_ORIGIN_PORT:false}
